<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🐍 贪吃蛇 Snake Game</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;font-size:clamp(14px,2.5vw,16px);background:#e8e6df;color:#333}
#app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,0)}
#info-panel{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:24px;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top,0));background:rgba(255,255,255,0.85);border-bottom:1px solid rgba(0,0,0,0.08);position:relative}
#info-panel .label{font-size:0.85rem;color:#666;font-weight:500}
#info-panel .value{font-size:1.3rem;font-weight:700;color:#222;min-width:36px;text-align:right}
#version-tag{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:0.65rem;color:#999}
#game-container{flex:1;display:flex;justify-content:center;align-items:center;position:relative;padding:8px;overflow:hidden}
canvas{display:block;border-radius:4px;box-shadow:0 2px 16px rgba(0,0,0,0.12);max-width:100%;max-height:100%}
.overlay{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.55);z-index:10;border-radius:4px}
.overlay.hidden{display:none}
.overlay-box{background:#fff;border-radius:14px;padding:28px 32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);min-width:220px}
.overlay-box h2{font-size:1.4rem;margin-bottom:12px;color:#222}
.overlay-box p{font-size:1rem;color:#555;margin-bottom:6px}
#controls{flex-shrink:0;padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom,0));background:rgba(255,255,255,0.85);border-top:1px solid rgba(0,0,0,0.08);display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
button{min-width:48px;min-height:48px;padding:8px 16px;border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;background:#f0f0f0;color:#333;transition:background 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap}
button:active{transform:scale(0.93);background:#e0e0e0}
button.green{background:#2e7d32;color:#fff}
button.active{background:#e8f5e9;color:#2e7d32;border:2px solid #2e7d32}
select{padding:6px 10px;border-radius:8px;border:1px solid #ccc;font-size:0.85rem;background:#fff;cursor:pointer;min-height:36px}
#stealth-indicator{text-align:center;font-size:0.85rem;font-weight:700;color:#ff8f00;animation:pulse 0.6s ease-in-out infinite alternate;padding:2px 0}
#stealth-indicator.hidden{display:none}
@keyframes pulse{from{opacity:0.5;transform:scale(0.97)}to{opacity:1;transform:scale(1.02)}}
.custom-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}
.custom-label{font-size:0.8rem;color:#555;font-weight:500;min-width:70px;text-align:right}
.small-btn{min-width:80px;min-height:36px;padding:6px 12px;font-size:0.8rem;border-radius:8px}
#feedback-link{text-align:center;font-size:0.75rem;color:#888;text-decoration:none;padding:4px}
@media(max-width:360px){#info-panel{gap:12px;padding:6px 10px}#info-panel .value{font-size:1.1rem}.row{gap:4px}button{min-width:40px;min-height:40px;padding:6px 10px;font-size:0.78rem}.small-btn{min-width:60px;min-height:32px;font-size:0.72rem}.custom-label{min-width:56px;font-size:0.72rem}}
</style>
</head>
<body>
<div id="app">
  <div id="info-panel">
    <div><span class="label">🏆 最高分</span> <span id="high-score" class="value">0</span></div>
    <div><span class="label">📊 当前分</span> <span id="current-score" class="value">0</span></div>
    <span id="version-tag">v1.0.0</span>
  </div>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <h2>🐍 贪 吃 蛇</h2>
        <p style="font-size:0.85rem;color:#888;margin:8px 0">—— 点击下方按钮开始 ——</p>
        <button class="green" onclick="startFromOverlay()" style="margin-top:12px;padding:14px 40px;font-size:1.1rem">🎮 开 始 游 戏</button>
        <p style="font-size:0.7rem;color:#aaa;margin-top:12px;line-height:1.6">⌨️ 电脑端：↑↓←→ / WASD<br>📱 手机端：滑动屏幕</p>
      </div>
    </div>
    <div id="game-over-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h2>游戏结束</h2>
        <p id="final-score">得分：0</p>
        <p id="final-high">最高分：0</p>
        <button class="green" onclick="restartGame()" style="margin-top:16px;padding:12px 32px;font-size:1.05rem">🔄 再来一局</button>
      </div>
    </div>
    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h2>暂停中</h2>
        <button class="green" onclick="resumeGame()" style="margin-top:16px;padding:12px 32px;font-size:1.05rem">▶ 继续</button>
      </div>
    </div>
  </div>
  <div id="controls">
    <div class="row">
      <label>难度：</label><select id="sel-difficulty"><option value="easy">简单</option><option value="normal" selected>普通</option><option value="hard">困难</option></select>
      <button onclick="restartGame()">🔄 重新开始</button>
      <button id="btn-wrap" onclick="toggleWrap()">🔁 穿墙：关</button>
      <button onclick="togglePause()">⏯ 暂停</button>
    </div>
    <div id="stealth-indicator" class="hidden">🛡️ 无敌 <span id="stealth-timer">0.0s</span></div>
    <div class="row">
      <span class="custom-label">🐍 蛇皮肤</span>
      <button class="small-btn active" data-skin="default_green" onclick="changeSkin('default_green',this)">🟢 经典绿</button>
      <button class="small-btn" data-skin="dark_blue" onclick="changeSkin('dark_blue',this)">🔵 深海洋</button>
    </div>
    <div class="row">
      <span class="custom-label">🖼 背景</span>
      <button class="small-btn active" data-bg="solid_light" onclick="changeBg('solid_light',this)">⬜ 浅米色</button>
      <button class="small-btn" data-bg="grid_paper" onclick="changeBg('grid_paper',this)">📐 网格纸</button>
    </div>
    <div class="row">
      <span class="custom-label">🍎 食物</span>
      <button class="small-btn active" data-food="classic_color" onclick="changeFood('classic_color',this)">🔲 经典块</button>
      <button class="small-btn" data-food="round_icon" onclick="changeFood('round_icon',this)">⭕ 圆润风</button>
    </div>
    <a id="feedback-link" href="#">💬 建议反馈</a>
  </div>
</div>

<script>
// ==================== 常量 ====================
const COLS = 25, ROWS = 25, MIN_CANVAS = 240;
const DIFFICULTY = { easy:{base:180,step:8,min:80}, normal:{base:150,step:5,min:60}, hard:{base:100,step:3,min:40} };
const SKINS = {
  default_green:{head:'#2e7d32',body:'#6abf69',radius:4},
  dark_blue:{head:'#1565c0',body:'#64b5f6',radius:6}
};
const BGS = {
  solid_light:{type:'solid',color:'#f0f0e8'},
  grid_paper:{type:'pattern',grid:'rgba(180,180,220,0.15)'}
};
const FOODS = {
  classic_color:{n:'#e74c3c',sp:'#f1c40f',sl:'#3498db',mode:'square'},
  round_icon:{n:'#dc3545',sp:'#ffc107',sl:'#0d6efd',mode:'circle'}
};

// ==================== 状态 ====================
let gameState = 'START', snake, food, score=0, highScore=0, wrapMode=false, difficulty='normal';
let speed, speedMul=1, scoreMul=1, timer=0, lastTime=0, animId=0;
let currentSkin='default_green', currentBg='solid_light', currentFood='classic_color';
let bonusFruit=null, stealthEgg=null, stealthActive=false, stealthFrames=0;
let direction='RIGHT', nextDir='RIGHT', dirQueue=[], swipeStart=null, swipeLocked=null, lastSwipe=0;

// DOM
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let scale = 20;

// ==================== 初始化 ====================
function init() {
  loadHighScore();
  loadConfig();
  updateUI();
  highlightBtns();
  resetSnake();
  spawnFood();
  resizeCanvas();
  window.addEventListener('resize', ()=>{clearTimeout(window._rt);window._rt=setTimeout(()=>{resizeCanvas();draw();},150)});
  window.addEventListener('orientationchange',()=>setTimeout(()=>{resizeCanvas();draw();},200));
  document.addEventListener('keydown',onKey);
  canvas.addEventListener('touchstart',onTouchS,{passive:false});
  canvas.addEventListener('touchmove',onTouchM,{passive:false});
  canvas.addEventListener('touchend',onTouchE,{passive:false});
  document.addEventListener('visibilitychange',()=>{if(document.hidden&&gameState==='PLAYING')pauseGame();});
  draw();
  requestAnimationFrame(uiLoop);
}

function loadHighScore(){try{const v=parseInt(localStorage.getItem('snake_hs'));if(!isNaN(v))highScore=v;}catch(e){}}
function saveHighScore(){if(score>highScore){highScore=score;try{localStorage.setItem('snake_hs',String(highScore));}catch(e){}}}
function loadConfig(){try{const c=JSON.parse(localStorage.getItem('snake_cfg'));if(c){currentSkin=c.skin||'default_green';currentBg=c.bg||'solid_light';currentFood=c.food||'classic_color';}}catch(e){}}
function saveConfig(){try{localStorage.setItem('snake_cfg',JSON.stringify({skin:currentSkin,bg:currentBg,food:currentFood}));}catch(e){}}

function resetSnake() {
  const sx=Math.floor(COLS/2), sy=Math.floor(ROWS/2);
  snake = [];
  // 蛇头在前，身体依次向左排列，避免初始帧撞自己
  snake.push({x:sx,y:sy});       // [0] 蛇头
  snake.push({x:sx-1,y:sy});     // [1] 身体
  snake.push({x:sx-2,y:sy});     // [2] 尾巴
  direction='RIGHT'; nextDir='RIGHT'; dirQueue=[];
  score=0; speedMul=1; scoreMul=1; timer=0; bonusFruit=null; stealthEgg=null; stealthActive=false; stealthFrames=0;
  speed = DIFFICULTY[difficulty].base;
}

function spawnFood() {
  const occ = new Set(snake.map(c=>`${c.x},${c.y}`));
  if(bonusFruit) occ.add(`${bonusFruit.x},${bonusFruit.y}`);
  if(stealthEgg) occ.add(`${stealthEgg.x},${stealthEgg.y}`);
  const empty=[];
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) if(!occ.has(`${x},${y}`)) empty.push({x,y});
  if(empty.length===0) { food={x:0,y:0,type:'NORMAL',frames:-1}; return; }
  const p=empty[Math.floor(Math.random()*empty.length)];
  let type='NORMAL',frames=-1;
  if(Math.random()<0.1){type=Math.random()<0.5?'SPEED_BOOST':'SLOW_DOWN';frames=60;}
  food={x:p.x,y:p.y,type,frames};
}

function trySpawnSpecial() {
  const occ = new Set(snake.map(c=>`${c.x},${c.y}`));
  occ.add(`${food.x},${food.y}`);
  if(bonusFruit) occ.add(`${bonusFruit.x},${bonusFruit.y}`);
  if(stealthEgg) occ.add(`${stealthEgg.x},${stealthEgg.y}`);
  const empty=[];
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) if(!occ.has(`${x},${y}`)) empty.push({x,y});
  if(empty.length===0) return;
  if(Math.random()<0.12 && !bonusFruit) { const p=empty[Math.floor(Math.random()*empty.length)]; bonusFruit={x:p.x,y:p.y,frames:270,total:270,scale:2.2,score:80}; }
  else if(Math.random()<0.05 && !stealthEgg) { const p=empty[Math.floor(Math.random()*empty.length)]; stealthEgg={x:p.x,y:p.y,frames:240,total:240,alpha:0,stage:'HIDDEN'}; }
}

// ==================== 游戏循环 ====================
function gameLoop(ts) {
  if(gameState!=='PLAYING') return;
  animId = requestAnimationFrame(gameLoop);
  if(lastTime===0) { lastTime=ts; return; }
  const dt = ts - lastTime; lastTime=ts;
  timer += dt;
  const effSpd = (speed * speedMul) / scoreMul;
  if(timer >= effSpd) {
    timer -= effSpd; if(timer > effSpd*3) timer=0;
    step();
  }
  updatePowerUps(dt);
  updateSpecials();
  draw();
}

function step() {
  // 方向：防反向
  const opp={UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
  if(dirQueue.length>0) { const d=dirQueue.shift(); if(d!==opp[nextDir]) nextDir=d; }
  direction=nextDir;
  // 移动
  const head = snake[0];
  const nh = {x:head.x,y:head.y};
  if(direction==='UP') nh.y--; else if(direction==='DOWN') nh.y++;
  else if(direction==='LEFT') nh.x--; else nh.x++;
  snake.unshift(nh);
  snake.pop();
  // 穿墙
  if(wrapMode || stealthActive) {
    if(nh.x<0) nh.x=COLS-1; if(nh.x>=COLS) nh.x=0;
    if(nh.y<0) nh.y=ROWS-1; if(nh.y>=ROWS) nh.y=0;
  }
  // 撞墙
  if(!stealthActive && !wrapMode && (nh.x<0||nh.x>=COLS||nh.y<0||nh.y>=ROWS)) { gameOver(); return; }
  // 撞自己
  if(!stealthActive) { for(let i=1;i<snake.length;i++) if(snake[i].x===nh.x&&snake[i].y===nh.y) { gameOver(); return; } }
  // 吃食物
  if(nh.x===food.x && nh.y===food.y) eatFood();
  // 特殊果实
  if(bonusFruit && nh.x===bonusFruit.x && nh.y===bonusFruit.y) { score+=Math.round(bonusFruit.score); bonusFruit=null; }
  if(stealthEgg && nh.x===stealthEgg.x && nh.y===stealthEgg.y) { score+=40; stealthEgg=null; stealthActive=true; stealthFrames=108; }
}

function eatFood() {
  const ft = food.type;
  if(ft==='SPEED_BOOST') scoreMul=2;
  if(ft==='SLOW_DOWN') speedMul=0.5;
  snake.push({...snake[snake.length-1]}); // grow
  score += 10 * scoreMul;
  const d=DIFFICULTY[difficulty];
  const ups = Math.floor(score/100);
  speed = Math.max(d.min, d.base - ups*d.step);
  spawnFood();
  trySpawnSpecial();
}

function updatePowerUps(dt) {
  const fd = dt/16.67;
  if(food.type!=='NORMAL') {
    food.frames -= Math.floor(fd);
    if(food.frames<=0) { speedMul=1; scoreMul=1; spawnFood(); }
  }
}

function updateSpecials() {
  if(bonusFruit) {
    bonusFruit.frames--;
    if(bonusFruit.frames<=0) bonusFruit=null;
    else { const p=1-bonusFruit.frames/bonusFruit.total; bonusFruit.scale=2.2+(1-2.2)*p; bonusFruit.score=80+(10-80)*p; }
  }
  if(stealthEgg) {
    stealthEgg.frames--;
    if(stealthEgg.frames<=0) stealthEgg=null;
    else { const e=stealthEgg.total-stealthEgg.frames; if(e<120) { stealthEgg.stage='HIDDEN'; stealthEgg.alpha=(e/120)*0.3; } else { stealthEgg.stage='VISIBLE'; stealthEgg.alpha=0.3+((e-120)/120)*0.7; } }
  }
  if(stealthActive) { stealthFrames--; if(stealthFrames<=0) stealthActive=false; }
}

function gameOver() {
  gameState='GAME_OVER'; cancelAnimationFrame(animId);
  saveHighScore();
  document.getElementById('game-over-overlay').classList.remove('hidden');
  document.getElementById('final-score').textContent=`得分：${score}`;
  document.getElementById('final-high').textContent=`最高分：${highScore}`;
  updateUI();
}

// ==================== 渲染 ====================
function resizeCanvas() {
  const maxW=window.innerWidth*0.9, maxH=window.innerHeight*0.5;
  let size=Math.floor(Math.min(maxW,maxH)/COLS)*COLS;
  size=Math.max(MIN_CANVAS,size);
  const dpr = window.devicePixelRatio||1;
  canvas.width=size*dpr; canvas.height=size*dpr;
  canvas.style.width=size+'px'; canvas.style.height=size+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  scale=size/COLS;
}

function draw() {
  const s=scale, w=COLS*s, h=ROWS*s;
  // 背景
  const bg = BGS[currentBg];
  if(bg.type==='solid') { ctx.fillStyle=bg.color; ctx.fillRect(0,0,w,h); }
  else { ctx.fillStyle='#fafaf8'; ctx.fillRect(0,0,w,h); ctx.strokeStyle=bg.grid; ctx.lineWidth=0.5; for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*s,0);ctx.lineTo(i*s,h);ctx.stroke()} for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*s);ctx.lineTo(w,i*s);ctx.stroke()} }
  if(bg.type==='solid') { ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5; for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*s,0);ctx.lineTo(i*s,h);ctx.stroke()} for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*s);ctx.lineTo(w,i*s);ctx.stroke()} }
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);

  // 食物
  const fs = FOODS[currentFood];
  let fc;
  if(food.type==='SPEED_BOOST') fc=fs.sp; else if(food.type==='SLOW_DOWN') fc=fs.sl; else fc=fs.n;
  const cx=food.x*s+s/2, cy=food.y*s+s/2, r=s/2-2;
  ctx.fillStyle=fc;
  if(fs.mode==='circle') { ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); }
  else { ctx.fillRect(food.x*s+2,food.y*s+2,s-4,s-4); }

  // 缩圈果
  if(bonusFruit) {
    const bsc=bonusFruit.scale, bcx=bonusFruit.x*s+s/2, bcy=bonusFruit.y*s+s/2, br=(s/2)*bsc;
    ctx.save(); ctx.shadowColor='rgba(255,107,53,0.35)'; ctx.shadowBlur=10*bsc;
    const g=ctx.createRadialGradient(bcx,bcy,0,bcx,bcy,br); g.addColorStop(0,'#ff8c42'); g.addColorStop(1,'#ff6b35'); ctx.fillStyle=g;
    if(fs.mode==='circle') { ctx.beginPath(); ctx.arc(bcx,bcy,br,0,Math.PI*2); ctx.fill(); }
    else { const half=(s/2)*bsc, x=bcx-half, y=bcy-half, sz=half*2, rr=4*bsc; ctx.beginPath(); ctx.moveTo(x+rr,y); ctx.lineTo(x+sz-rr,y); ctx.quadraticCurveTo(x+sz,y,x+sz,y+rr); ctx.lineTo(x+sz,y+sz-rr); ctx.quadraticCurveTo(x+sz,y+sz,x+sz-rr,y+sz); ctx.lineTo(x+rr,y+sz); ctx.quadraticCurveTo(x,y+sz,x,y+sz-rr); ctx.lineTo(x,y+rr); ctx.quadraticCurveTo(x,y,x+rr,y); ctx.closePath(); ctx.fill(); }
    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.font=`bold ${Math.max(10,s*0.42)}px sans-serif`; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(`${Math.floor(bonusFruit.score)}`,bcx,bcy-br-2);
    ctx.restore();
  }

  // 隐身蛋
  if(stealthEgg) {
    ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(1,stealthEgg.alpha)); ctx.fillStyle='#e8e8e8';
    const ex=stealthEgg.x*s+s/2, ey=stealthEgg.y*s+s/2;
    if(stealthEgg.stage==='VISIBLE') { ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowBlur=6+Math.sin(Date.now()/200)*3; }
    if(fs.mode==='circle') { ctx.beginPath(); ctx.arc(ex,ey,(s/2)*0.7,0,Math.PI*2); ctx.fill(); }
    else { ctx.fillRect(stealthEgg.x*s+s*0.15,stealthEgg.y*s+s*0.15,s*0.7,s*0.7); }
    ctx.restore();
  }

  // 蛇
  const sk = SKINS[currentSkin];
  for(let i=snake.length-1;i>=0;i--) {
    const seg=snake[i], sx=seg.x*s, sy=seg.y*s;
    if(i===0) {
      ctx.fillStyle=sk.head; if(stealthActive) ctx.globalAlpha=0.35;
      const pad=1, ww=s-pad*2; roundRect(sx+pad,sy+pad,ww,ww,sk.radius); ctx.fill();
      if(!stealthActive) { ctx.fillStyle='#fff'; const er=s*0.12; switch(direction){case'RIGHT':circle(sx+s*0.7,sy+s*0.3,er);circle(sx+s*0.7,sy+s*0.7,er);break;case'LEFT':circle(sx+s*0.3,sy+s*0.3,er);circle(sx+s*0.3,sy+s*0.7,er);break;case'UP':circle(sx+s*0.3,sy+s*0.3,er);circle(sx+s*0.7,sy+s*0.3,er);break;case'DOWN':circle(sx+s*0.3,sy+s*0.7,er);circle(sx+s*0.7,sy+s*0.7,er);break;} ctx.fill(); }
      if(stealthActive) ctx.globalAlpha=1;
    } else {
      ctx.fillStyle=sk.body; if(stealthActive) ctx.globalAlpha=0.35;
      ctx.fillRect(sx+2,sy+2,s-4,s-4);
    }
  }
  if(stealthActive) ctx.globalAlpha=1;

  // 无敌光
  if(stealthActive) { ctx.save(); ctx.fillStyle='rgba(255,215,0,0.08)'; ctx.fillRect(0,0,w,h); ctx.restore(); }
}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function circle(cx,cy,r){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2)}

// ==================== 输入 ====================
function onKey(e){const m={ArrowUp:'UP',ArrowDown:'DOWN',ArrowLeft:'LEFT',ArrowRight:'RIGHT',w:'UP',W:'UP',s:'DOWN',S:'DOWN',a:'LEFT',A:'LEFT',d:'RIGHT',D:'RIGHT'};const d=m[e.key];if(d&&gameState==='PLAYING'){e.preventDefault();const opp={UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};if(dirQueue.length===0&&d!==opp[nextDir])dirQueue.push(d);}}
function onTouchS(e){e.preventDefault();const t=e.touches[0];swipeStart={x:t.clientX,y:t.clientY};swipeLocked=null}
function onTouchM(e){e.preventDefault()}
function onTouchE(e){e.preventDefault();if(!swipeStart)return;const t=e.changedTouches[0];const dx=t.clientX-swipeStart.x,dy=t.clientY-swipeStart.y;if(Math.abs(dx)<20&&Math.abs(dy)<20){swipeStart=null;return}if(!swipeLocked)swipeLocked=Math.abs(dx)>Math.abs(dy)?'H':'V';const now=Date.now();if(now-lastSwipe<100){swipeStart=null;return}lastSwipe=now;let d=null;if(swipeLocked==='H')d=dx>0?'RIGHT':'LEFT';else d=dy>0?'DOWN':'UP';if(d&&dirQueue.length===0)dirQueue.push(d);swipeStart=null}

// ==================== UI ====================
function updateUI() {
  document.getElementById('high-score').textContent=highScore;
  document.getElementById('current-score').textContent=score;
  const si=document.getElementById('stealth-indicator');
  if(stealthActive) { si.classList.remove('hidden'); document.getElementById('stealth-timer').textContent=(stealthFrames/60).toFixed(1)+'s'; }
  else si.classList.add('hidden');
}

function uiLoop() { updateUI(); requestAnimationFrame(uiLoop); }

function restartGame() {
  if(animId) cancelAnimationFrame(animId);
  resetSnake(); spawnFood(); gameState='IDLE';
  document.getElementById('game-over-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  speed = DIFFICULTY[difficulty].base;
  draw();
}

function startGame() {
  if(gameState==='START'||gameState==='IDLE'||gameState==='GAME_OVER') { resetSnake(); spawnFood(); speed=DIFFICULTY[difficulty].base; }
  gameState='PLAYING'; lastTime=0; timer=0;
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('game-over-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  animId = requestAnimationFrame(gameLoop);
}

// 开始界面按钮入口
function startFromOverlay() { startGame(); }

// 点击"重新开始"直接开始游戏
const origRestart = restartGame;
restartGame = function() { origRestart(); startGame(); };

function pauseGame() { if(gameState!=='PLAYING')return; gameState='PAUSED'; cancelAnimationFrame(animId); document.getElementById('pause-overlay').classList.remove('hidden'); }
function resumeGame() { if(gameState!=='PAUSED')return; gameState='PLAYING'; lastTime=0; document.getElementById('pause-overlay').classList.add('hidden'); animId=requestAnimationFrame(gameLoop); }
function togglePause() { if(gameState==='PLAYING')pauseGame(); else if(gameState==='PAUSED')resumeGame(); }
function toggleWrap() { wrapMode=!wrapMode; document.getElementById('btn-wrap').textContent=wrapMode?'🔁 穿墙：开':'🔁 穿墙：关'; }

document.getElementById('sel-difficulty').addEventListener('change',function(){difficulty=this.value;speed=DIFFICULTY[difficulty].base;});

function changeSkin(id,btn){currentSkin=id;saveConfig();highlightBtns();draw()}
function changeBg(id,btn){currentBg=id;saveConfig();highlightBtns();draw()}
function changeFood(id,btn){currentFood=id;saveConfig();highlightBtns();draw()}

function highlightBtns(){
  document.querySelectorAll('[data-skin]').forEach(b=>b.classList.toggle('active',b.dataset.skin===currentSkin));
  document.querySelectorAll('[data-bg]').forEach(b=>b.classList.toggle('active',b.dataset.bg===currentBg));
  document.querySelectorAll('[data-food]').forEach(b=>b.classList.toggle('active',b.dataset.food===currentFood));
}

// 启动
init();
</script>
